model:
  base_model_id: Qwen/Qwen3.5-4B
  loader_variant: unsloth
training:
  max_seq_length: 1536
  load_in_4bit: true
  max_prompt_length: 1024
  max_completion_length: 512
  generations_per_prompt: 4
  learning_rate: 5.0e-6
  adam_beta1: 0.9
  adam_beta2: 0.99
  weight_decay: 0.1
  warmup_ratio: 0.1
  lr_scheduler_type: cosine
  optim: adamw_8bit
  max_grad_norm: 0.1
  save_steps: 100
  behavior_similarity_threshold: 0.35
  reward_weights:
    format: 1.0
    cleanup: 1.5
    naming: 1.5
    compile: 2.0
    behavior: 1.5
    readability: 1.0
    hallucination_penalty: 2.0
